/* ---- persistent ground blood pool: painted ink-bleed, lingers ~40s then fades ---- */
function drawStain(g,cx,cy,z,s){ const k=Math.min(1,s.t*3+0.25)*Math.max(0,Math.min(1,(s.life-s.t)/8));
  if(k<=0.01)return; g.save(); g.globalCompositeOperation='multiply'; g.globalAlpha=0.55*k*(0.55+s.amt*0.5);
  const r=(4+s.amt*7)*z, grad=g.createRadialGradient(cx,cy,0,cx,cy,r);
  grad.addColorStop(0,'rgba(92,8,12,0.92)'); grad.addColorStop(0.6,'rgba(70,6,10,0.5)'); grad.addColorStop(1,'rgba(54,6,10,0)');
  g.fillStyle=grad; g.beginPath();g.ellipse(cx,cy,r,r*0.5,0,0,7);g.fill();
  g.fillStyle='rgba(78,7,11,0.5)';                                                          // irregular lobes so it reads painted
  for(let i=0;i<4;i++){ const a=s.seed+i*1.7, rr=r*(0.45+((i*7)%4)*0.16);
    g.beginPath();g.ellipse(cx+Math.cos(a)*rr*0.7,cy+Math.sin(a)*rr*0.35,rr*0.4,rr*0.22,a,0,7);g.fill(); }
  g.restore(); }

/* ---- flung structural debris / embers, with a ground shadow while airborne ---- */
function drawDebris(g,cx,cy,z,d){ const k=Math.max(0,Math.min(1,(d.life-d.t)/0.5));
  if(d.h>0.6){ g.save(); g.globalAlpha=0.16*k; g.fillStyle='#000'; g.beginPath();g.ellipse(cx,cy,d.r*1.1*z,d.r*0.5*z,0,0,7);g.fill(); g.restore(); }
  g.save(); g.globalAlpha=k; g.translate(cx,cy-d.h*z); g.rotate(d.rot);
  if(d.ember){ g.globalCompositeOperation='lighter'; g.fillStyle='rgba(255,170,60,'+(0.85*k)+')'; g.beginPath();g.arc(0,0,d.r*0.6*z,0,7);g.fill(); }
  else { g.fillStyle=d.col; g.fillRect(-d.r*z,-d.r*0.5*z,d.r*2*z,d.r*z); g.strokeStyle='rgba(18,12,8,0.55)'; g.lineWidth=0.3*z; g.strokeRect(-d.r*z,-d.r*0.5*z,d.r*2*z,d.r*z); }
  g.restore(); }

/* ---- airborne blood droplet with a short motion streak ---- */
function drawSpray(g,cx,cy,z,p){ const k=Math.max(0,Math.min(1,(p.max-p.life)/0.3));
  g.save(); g.translate(cx,cy-p.h*z); g.strokeStyle='rgba(120,10,14,'+(0.5*k)+')'; g.lineWidth=p.r*0.7*z;
  g.beginPath();g.moveTo(0,0);g.lineTo(-p.vx*0.9*z,-p.vy*0.9*z);g.stroke();
  g.fillStyle='rgba(150,14,16,'+(0.9*k)+')'; g.beginPath();g.arc(0,0,p.r*z,0,7);g.fill(); g.restore(); }

/* ---- damage overlay painted over a still-standing raided building: blood down the eaves,
   structural cracks, a collapse dust-shroud, and extra black smoke for arson ---- */
function drawRaidDamage(g,cx,cy,z,e){ const d=e.dmg||0; if(d<0.02)return; const arson=e.raidAction==='arson';
  const hw=TW/2*z, top=cy-22*z;
  if(!arson){                                                                                // blood streaking down the walls (pillage)
    g.save(); g.globalCompositeOperation='multiply'; g.globalAlpha=Math.min(1,d*1.5);
    g.strokeStyle='rgba(96,8,12,0.85)'; g.fillStyle='rgba(96,8,12,0.7)';
    for(let i=0;i<5;i++){ const ox=-hw*0.55+i*hw*0.28, len=(4+((i*7)%5))*z*(0.4+d); g.lineWidth=(1+(i%2))*z;
      g.beginPath();g.moveTo(cx+ox,top);g.lineTo(cx+ox,top+len);g.stroke();
      g.beginPath();g.arc(cx+ox,top+len,(1+(i%2)*0.6)*z,0,7);g.fill(); }
    for(let i=0;i<Math.round(d*7);i++){ const a=i*2.1; g.fillStyle='rgba(110,10,14,0.6)';
      g.beginPath();g.arc(cx+Math.cos(a)*hw*0.7,top+6*z+Math.sin(a)*6*z,(0.6+(i%3)*0.5)*z,0,7);g.fill(); }
    g.restore(); }
  g.save(); g.globalAlpha=Math.min(0.7,d*0.7); g.strokeStyle='rgba(18,12,10,0.8)'; g.lineWidth=0.8*z;   // structural cracks
  for(let i=0;i<Math.round(d*5);i++){ let xx=cx+(-hw*0.5+i*hw*0.25), yy=top; g.beginPath();g.moveTo(xx,yy);
    for(let s=0;s<4;s++){ yy+=5*z; xx+=((i*7+s*13)%5-2)*0.9*z; g.lineTo(xx,yy);} g.stroke(); }
  g.restore();
  if(e.state==='collapse'){ const cf=Math.min(1,e.st/1.4);                                   // dust shroud on the cave-in
    g.save(); g.globalAlpha=0.5*(1-Math.abs(cf-0.5)*1.3); g.fillStyle='rgba(120,110,100,0.5)';
    for(let i=0;i<8;i++){ const a=i*0.9, rr=(6+cf*16)*z;
      g.beginPath();g.ellipse(cx+Math.cos(a)*rr*0.7,top+8*z-cf*6*z+Math.sin(a)*rr*0.3,(4+cf*5)*z,(3+cf*3)*z,0,0,7);g.fill(); }
    g.restore(); }
  if(arson&&d>0.08){ const tt=fx*0.001, inten=Math.min(1,d*1.3);                            // fire visibly spreading up the structure: several climbing licks, not one blob
    g.save(); g.globalCompositeOperation='lighter';
    const N=2+Math.round(inten*4);
    for(let i=0;i<N;i++){ const ox=-hw*0.6+(i/(Math.max(1,N-1)))*hw*1.2, ig=((i*53+7)%100)/100;   // staggered ignition points along the eaves
      if(ig>inten*1.15)continue;                                                            // not every point has caught yet — reads as spreading, not uniform
      const flick=Math.sin(tt*10+i*2.3)*1.2*z, h=(5+inten*9+(i%2?2:0))*z;
      flameTongue(g,cx+ox+flick,top+3*z,(1.4+inten*1.4)*z,h*0.6,'rgba(255,120,20,0.6)');
      flameTongue(g,cx+ox+flick*0.6,top+3*z,(0.9+inten*0.8)*z,h*0.4,'rgba(255,210,80,0.7)'); }
    g.restore();
    g.save(); g.globalAlpha=Math.min(0.65,d*0.55); g.fillStyle='rgba(22,18,16,0.55)';        // thicker, more varied black smoke as the fire climbs
    for(let i=0;i<6;i++){ const yy=top-(8+i*7)*z-((tt*7+i*1.6)%9)*z, xx=cx+Math.sin(tt*1.7+i*2.1)*9*z, rr=(4+i*2.1+inten*3)*z;
      g.globalAlpha=Math.min(0.6,d*0.55)*(0.5+0.5*Math.sin(tt*3+i)); g.beginPath();g.ellipse(xx,yy,rr,rr*0.78,0,0,7);g.fill(); }
    g.restore(); } }

/* ---- household defender: standing its ground, then struck and toppling — the visible CAUSE of the corpse that follows ---- */
function drawDefender(g,cx,cy,z,d){
  if(d.state==='idle'){ const sh=Math.sin((fx||0)*0.006+d.seed)*0.5*z;                  // a fearful shiver, standing its ground
    shadowEllipse(g,cx,cy,2.6,z); drawPerson(g,cx+sh,cy,z,d.kit,d.dir,1); return; }
  if(d.state==='struck'){ const p=Math.min(1,d.t/0.4), fall=p*p;                        // struck → staggers → topples
    shadowEllipse(g,cx,cy,2.6,z);
    g.save(); g.translate(cx,cy); g.rotate(d.recoilDX*1.1*fall); g.translate(d.recoilDX*4*z*fall,-d.recoilDY*3*z*fall);
    drawPerson(g,0,0,z,d.kit,d.dir,1); g.restore();
    if(d.t<0.13){ g.save(); g.globalCompositeOperation='lighter'; g.fillStyle='rgba(255,235,225,'+(0.6*(1-d.t/0.13))+')';   // contact flash where steel met flesh
      g.beginPath();g.arc(cx+d.recoilDX*3*z,cy-6*z,2.6*z,0,7);g.fill(); g.restore(); }
    drawBlood(g,cx,cy+1*z,z,0.5+p*0.3); } }

function drawViolenceFX(ctx,z){
  // NOTE: ground blood stains are now drawn in the pre-pass above (with litter), so agents
  // standing on a stain are correctly painted on top of it instead of it floating over them.
  const list=corpses.map(c=>({k:'c',c,d:c.x+c.y}));
  for(const e of encounters) if(e.raid&&e.defenders) for(const d of e.defenders) if(d.state!=='down') list.push({k:'d',d,dd:d.x+d.y});
  list.sort((a,b)=>(a.d!=null?a.d:a.dd)-(b.d!=null?b.d:b.dd));
  for(const o of list){ if(o.k==='c'){ const[cx,cy]=s2(o.c.x,o.c.y); if(cx<-90||cx>VW+90||cy<-90||cy>VH+90)continue; drawCorpse(ctx,cx,cy,z,o.c); }
    else { const[cx,cy]=s2(o.d.x,o.d.y); if(cx<-90||cx>VW+90||cy<-90||cy>VH+90)continue; drawDefender(ctx,cx,cy,z,o.d); } }
  for(const e of encounters){ if(e.raid&&e.dmg>0){ const[cx,cy]=s2(e.rtx,e.rty); if(cx>-140&&cx<VW+140&&cy>-180&&cy<VH+140) drawRaidDamage(ctx,cx,cy,z,e); } }
  for(const d of debris){ const[cx,cy]=s2(d.x,d.y); if(cx<-90||cx>VW+90||cy<-90||cy>VH+90)continue; drawDebris(ctx,cx,cy,z,d); }
  for(const p of sprays){ const[cx,cy]=s2(p.x,p.y); if(cx<-90||cx>VW+90||cy<-90||cy>VH+90)continue; drawSpray(ctx,cx,cy,z,p); }
  for(const e of encounters){ if(e.state==='approach'||e.state==='chase'){ const v=e.vic, vx=v.wx!=null?v.wx:v.x, vy=v.wy!=null?v.wy:v.y; const[cx,cy]=s2(vx,vy);
    ctx.save(); ctx.globalAlpha=0.85; ctx.fillStyle='#b3261e'; ctx.font='700 '+Math.max(8,(8*z)|0)+'px serif'; ctx.textAlign='center'; ctx.fillText('!',cx,cy-15*z); ctx.restore(); } } }

/* ============================ ECONOMY / DEVELOPMENT ============================ */
function tick(){
  rebuildCoverage();
  let pop=0,cap=0,comJobs=0,indJobs=0,powerCap=0,powerUse=0,civicCount={}, healthCov=0,eduCov=0,devTiles=0,validators=0;
  // power supply
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){const c=grid[y][x]; if(c.civ===PLANT&&!c.burn)powerCap+=60;}
  S.powerCap=powerCap;
  // development pass
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){ const c=grid[y][x];
    if(c.civ){ civicCount[c.civ]=(civicCount[c.civ]||0)+1; if(c.civ===VALID&&!c.burn)validators++; if(c.civ===TOWN){cap+=12;pop+=8;} continue; }
    if(!c.zone)continue;
    const road=nearRoad(x,y,3), powered=!researchedElectric()|| (c.wire||nearWire(x,y));
    const q=qualityAt(x,y);
    const dem = c.zone===ZR?S.demand.R : c.zone===ZC?S.demand.C : S.demand.I;
    // growth / decay
    if(road && powered && dem>0.05 && q>0.3 && !c.burn){
      const maxDev = q>0.75?3 : q>0.5?2 : 1; const needHosp = (c.dev>=2); 
      if(c.dev<maxDev && (!needHosp || (healthGrid&&healthGrid[y][x])) && Math.random()<0.12*(dem+0.3)){ c.dev++; if(c.own===0)c.own=(Math.random()<0.2?2:CLIENT); }
      if(c.blight>0&&Math.random()<0.4)c.blight--;
    } else if(!c.burn) {
      if(Math.random()<0.10){ if(c.dev>0&&Math.random()<0.5)c.dev--; else c.blight=Math.min(3,c.blight+1); }
    }
    // abandonment
    if(c.blight>=3&&c.dev>0&&Math.random()<0.05){ if(c.own===CLIENT)toast('🏚 Abandoned','a plot you owned'); c.zone=0;c.dev=0;c.own=0;c.blight=0;c.ruin=1;c.guard=0; }
    if(c.dev>0){ devTiles++;
      if(c.zone===ZR){cap+=c.dev*5;pop+=c.dev*4;} else if(c.zone===ZC){comJobs+=c.dev*3;} else {indJobs+=c.dev*4;}
      if(researchedElectric())powerUse+=c.dev;
      if(healthGrid&&healthGrid[y][x])healthCov++; if(eduGrid&&eduGrid[y][x])eduCov++;
    }
  }
  S.pop=pop; S.cap=cap; S.comJobs=comJobs; S.indJobs=indJobs; S.jobs=comJobs+indJobs; S.powerUse=powerUse;
  S.healthPct=devTiles?healthCov/devTiles:0; S.eduPct=devTiles?eduCov/devTiles:0;
  S.electricity=researchedElectric();
  // demand model
  const jobsTotal=comJobs+indJobs;
  S.demand.R = clamp(0.3 + (jobsTotal - pop*0.5)/Math.max(40,pop+40), 0, 1);
  S.demand.C = clamp(0.2 + (pop*0.5 - comJobs)/Math.max(40,pop+40), 0, 1);
  S.demand.I = clamp(0.2 + (pop*0.45 - indJobs)/Math.max(40,pop+40), 0, 1);
  // economy — SOL creator rewards are paid from a shared global pool, split by
  // CURRENT ownership share. your cut = POOL * (yourProperty / allProperty).
  // Buildings that are burning/raided earn nothing. $SORU is buy-and-burn only.
  let myWeight=0, totalWeight=0;
  for(const r of grid)for(const c of r){
    if(c.burn) continue;                               // raided/burning property pays no one
    let w=0;
    if(c.dev>0 && c.own) w += c.dev;                   // a standing zoned plot (weighted by development)
    if(c.civ===VALID)    w += VAL_WEIGHT;              // a validator is high-value standing property
    if(w<=0) continue;
    totalWeight += w;
    if(c.own===CLIENT) myWeight += w;                  // validators set own=CLIENT on placement
  }
  const pool   = SOL_POOL_BASE + totalWeight*SOL_POOL_GROWTH;   // global pool grows with island activity
  S.solShare   = totalWeight>0 ? myWeight/totalWeight : 0;      // your live ownership share (0..1)
  const solReward = pool * S.solShare;                          // proportional payout
  S.wallet.sol+=solReward; S.netTurn=solReward;
  // global Kami — EXACTLY the $SORU burned across the island (added 1:1 in spend()).
  // ages turn only when collective burn reaches the thresholds; no random accrual.
  if(DEV_SIMULATE_KAMI && S.era<ERAS.length-1){        // dev/test toggle ONLY — ships false
    const gap=KAMI_REQ[S.era+1]-KAMI_REQ[S.era];
    const activity=clamp((S.recentBurn||0)/180,0,1); S.recentBurn=(S.recentBurn||0)*0.5;
    S.kami += gap*(0.03+0.06*activity); }
  while(S.era<ERAS.length-1 && S.kami>=KAMI_REQ[S.era+1]) advanceAge();
  // city-wide safety from the crime field (police coverage)

  toast(ERAS[S.era].jp+' '+ERAS[S.era].nm,'a new age dawns across the island'); advise('The age turns to <b>'+ERAS[S.era].nm+'</b> — the island\'s collective Kami reshapes the world. New works unlocked.'); }
advanceBtn.onclick=()=>{ if(S.era>=ERAS.length-1){advise('<b>Quantum Edo</b> — the legendary final age. The island can rise no further.');return;}
  const a=KAMI_REQ[S.era],b=KAMI_REQ[S.era+1],pct=Math.floor(clamp((S.kami-a)/(b-a),0,1)*100);
  advise('Ages turn from <b>collective Kami</b> (⛩) — every $SORU burned across the island fuels it, never one player. Next age <b>'+ERAS[S.era+1].nm+'</b> at '+pct+'%.'); };
// DEX
function dexPrice(){return S.dex.sol/S.dex.soru;}
function openDex(){document.getElementById('dexModal').classList.add('show');refreshDex();}
function refreshDex(){dxPool.textContent=S.dex.sol.toFixed(1)+' SOL / '+fmt(S.dex.soru)+' SORU';dxPrice.textContent=dexPrice().toFixed(5);
  dxSol.textContent=S.wallet.sol.toFixed(3);dxSoru.textContent=fmt(S.wallet.soru);}
document.getElementById('dexBtn').onclick=openDex;
document.getElementById('dxClose').onclick=()=>document.getElementById('dexModal').classList.remove('show');
document.getElementById('dxBuy').onclick=()=>{const amt=Math.max(0,+dxAmt.value||0);if(amt<=0||amt>S.wallet.sol)return;
  const k=S.dex.sol*S.dex.soru,newSol=S.dex.sol+amt,out=S.dex.soru-k/newSol; S.wallet.sol-=amt;S.wallet.soru+=out*0.99;S.dex.sol=newSol;S.dex.soru-=out; refreshDex();refreshHUD();toast('Swapped','+'+fmt(out*0.99)+' SORU');};
document.getElementById('dxSell').onclick=()=>{const amt=Math.max(0,+dxAmt.value||0);if(amt<=0||amt>S.wallet.soru)return;
  const k=S.dex.sol*S.dex.soru,newSoru=S.dex.soru+amt,out=S.dex.sol-k/newSoru; S.wallet.soru-=amt;S.wallet.sol+=out*0.99;S.dex.soru=newSoru;S.dex.sol-=out; refreshDex();refreshHUD();toast('Swapped','+'+(out*0.99).toFixed(3)+' SOL');};

/* ============================ LOOP / BOOT ============================ */
let lastT=0, tickAcc=0, fireAcc=0, bootFitT=0, lastVPH=-1;
function loop(t){ const dt=lastT?Math.min(0.05,(t-lastT)/1000):0; lastT=t; fx=t;
  try{
    // During the first ~2s, re-fit whenever the viewport height changes (mobile URL-bar collapse, late layout)
    if(bootFitT<2.2){ bootFitT+=dt; const h=Math.round(cv.getBoundingClientRect().height)||0; if(h>0&&h!==lastVPH){ lastVPH=h; resize(); fit(); } }
    updateEnv(dt); updateTraffic(dt); updateResidents(dt); updateApparitions(dt); updateEncounters(dt); updateCorpses(dt); updateGore(dt); updateDecay(dt);
    tickAcc+=dt; if(tickAcc>=1.5){tickAcc=0;tick();}
    fireAcc+=dt; if(fireAcc>=40){fireAcc=0; if(S.pop>90&&Math.random()<0.18)igniteRandom();}
    render();
  }catch(err){ if(window.__err)window.__err('loop: '+(err.message||err)); }
  requestAnimationFrame(loop); }
try{
  resize(); genMap(); rebuildCoverage(); rebuildValue(); syncTraffic(); syncDecay(); buildPalette(); refreshHUD(); fit();
  S.tool=CATALOG[0]; markSel();
  document.getElementById('mysticPill').onclick=drawTarotCard; updateMystic();
}catch(err){ if(window.__err)window.__err('boot: '+(err.message||err)); }
const bgm=document.getElementById('bgm'); bgm.volume=0.5; let musicOn=false;
function setMusic(on){ if(on){ bgm.play().then(()=>{musicOn=true;musicBtn.textContent='🔊';}).catch(()=>{musicOn=false;musicBtn.textContent='🔇';}); }
  else { bgm.pause(); musicOn=false; musicBtn.textContent='🔇'; } }
musicBtn.onclick=()=>setMusic(!musicOn);
function firstGesture(){ if(!musicOn)setMusic(true); sfxCtx(); window.removeEventListener('pointerdown',firstGesture); }
window.addEventListener('pointerdown',firstGesture,{once:true});
advise('Build something beautiful. Every act costs <b>$SORU</b> (top-left) and <b>100% is burned</b> into <b>Kami</b> (⛩) that ages the whole island through 9 Ages. Buildings you keep standing pay you <b>SOL</b> — swap it for more $SORU at the DEX. Guard your wards with FIRE & POLICE; raid rivals (🔶) with ARSON / PILLAGE.');
requestAnimationFrame(loop);
setTimeout(()=>{resize();fit();},120); setTimeout(()=>{resize();fit();},500);

</script>

  document.head.appendChild(css);

  /* ---------- DOM ---------- */
  var wrap=document.createElement('div'); wrap.id='ykWrap';
  wrap.innerHTML =
    '<div id="ykFloat"><div id="ykStack">'
    + '<div id="ykEgg"><b></b><b></b><b></b><b></b></div>'
    + '<img id="ykImg" alt="guide" draggable="false">'
    + '<div id="ykLids"></div>'
    + '<div id="ykFx"><i>✦</i><i>✦</i><i>✧</i><i>✧</i></div>'
    + '<div id="ykGear" title="Guide settings">⚙</div>'
    + '</div></div>'
    + '<div id="ykBubble"><div id="ykName">·</div><div id="ykMsg"></div></div>';
  document.body.appendChild(wrap);
  var img=wrap.querySelector('#ykImg'), stack=wrap.querySelector('#ykStack'),
      lidsEl=wrap.querySelector('#ykLids'), egg=wrap.querySelector('#ykEgg'),
      fx=wrap.querySelector('#ykFx'), gear=wrap.querySelector('#ykGear'),
      bubble=wrap.querySelector('#ykBubble'), nameEl=wrap.querySelector('#ykName'), msg=wrap.querySelector('#ykMsg');

  var modal=document.createElement('div'); modal.id='ykModal';
  modal.innerHTML =
    '<div id="ykBox"><h3 id="ykTitle">Choose your guide ✦</h3>'
    + '<p class="sub" id="ykSub">A little yokai will watch over your island and teach you its ways.</p>'
    + '<div id="ykCards"></div>'
    + '<div id="ykHint">Tap a guide — it will hatch from its egg. 🥚</div>'
    + '<div id="ykFoot"><span class="pwr">Guide overlay</span><span><button class="on" id="ykOn">On</button><button id="ykOff">Off</button><button id="ykDone">Done</button></span></div>'
    + '</div>';
  document.body.appendChild(modal);
  var cardsEl=modal.querySelector('#ykCards'), titleEl=modal.querySelector('#ykTitle'), subEl=modal.querySelector('#ykSub');
  ORDER.forEach(function(id){
    var h=HELPERS[id], c=document.createElement('div'); c.className='ykCard'; c.dataset.id=id; c.style.setProperty('--c',h.accent);
    c.innerHTML='<div class="pic"><img src="'+h.img+'" alt="'+h.name+'"></div>'
      +'<h4>'+h.name+'<span>'+h.kanji+'</span></h4><p>'+h.tagline+'</p><div class="pick">Choose</div>';
    c.addEventListener('click',function(){ pickCard(id); });
    cardsEl.appendChild(c);
  });

  var tog=document.createElement('button'); tog.id='ykToggle'; tog.className='zb';
  tog.title='Guide — on/off'; tog.innerHTML='👁<b></b>';
  (document.getElementById('zoom')||document.body).appendChild(tog);

  /* ---------- bubble / tips ---------- */
  var hideT=null;
  function clean(t){ return t.replace(/\$SORU/g,'<b>$SORU</b>').replace(/\bSOL\b/g,'<b>SOL</b>').replace(/Kami ⛩/g,'<span class="ko">Kami ⛩</span>'); }
  function say(text,opts){ if(!enabled||!cur) return; opts=opts||{};
    nameEl.textContent=HELPERS[cur].name; msg.innerHTML=clean(text); bubble.classList.add('show');
    if(opts.point) point(opts.point);
    clearTimeout(hideT); var dur=opts.dur||Math.min(8000,Math.max(3200,text.length*58));
    hideT=setTimeout(function(){ bubble.classList.remove('show'); },dur); }
  function point(sel){ var el=document.querySelector(sel); if(!el) return;
    el.classList.remove('yk-hi'); void el.offsetWidth; el.classList.add('yk-hi');
    setTimeout(function(){ el.classList.remove('yk-hi'); },2700); }
  function once(key,text,opts){ if(!enabled||!cur||isSeen(key)) return false; mark(key); say(text,opts); return true; }

  /* ---------- per-helper visuals ---------- */
  function buildLids(h){ lidsEl.innerHTML='';
    h.lids.forEach(function(r){ var d=document.createElement('div'); d.className='ykLid';
      d.style.cssText='left:'+r[0]+'%;top:'+r[1]+'%;width:'+r[2]+'%;height:'+r[3]+'%;'
        +'background:linear-gradient('+h.skin[0]+','+h.skin[1]+');border-bottom:2.5px solid '+h.lash+';';
      lidsEl.appendChild(d); }); }
  function applyHelper(id){ var h=HELPERS[id]; cur=id; lset('yk_helper',id);
    wrap.style.setProperty('--yk-accent',h.accent); img.src=h.img; buildLids(h); nameEl.textContent=h.name; applyVis(); }

  /* ---------- idle life ---------- */
  function blink(){ if(enabled&&cur){ lidsEl.querySelectorAll('.ykLid').forEach(function(l){ l.classList.remove('blink'); void l.offsetWidth; l.classList.add('blink'); }); }
    setTimeout(blink,2600+Math.random()*4200); }
  setTimeout(blink,2600);
  function perk(){ if(enabled&&cur&&!egg.classList.contains('show')){ stack.classList.remove('perk'); void stack.offsetWidth; stack.classList.add('perk'); }
    setTimeout(perk,9000+Math.random()*8000); }
  setTimeout(perk,7000);

  /* ---------- egg hatch ---------- */
  function hatch(id){ var h=HELPERS[id]; applyHelper(id);
    if(!enabled){ setHatched(id); return; }
    egg.style.setProperty('--es',h.egg.shell); egg.style.setProperty('--ed',h.egg.dot);
    img.style.opacity='0'; bubble.classList.remove('show');
    egg.classList.add('show'); void egg.offsetWidth;
    setTimeout(function(){ egg.classList.add('wob'); },180);
    setTimeout(function(){
      egg.classList.remove('wob'); fx.classList.add('on'); spawnShards();
      egg.style.transition='opacity .22s,transform .22s'; egg.style.transform='scale(1.15)'; egg.style.opacity='0';
    },1000);
    setTimeout(function(){
      egg.classList.remove('show'); egg.style.transform=''; egg.style.transition='';
      img.style.opacity='1'; img.style.animation='ykRise .55s ease';
      setTimeout(function(){ img.style.animation=''; },560);
    },1230);
    setTimeout(function(){ fx.classList.remove('on'); setHatched(id); welcome(id); },1900);
  }
  function spawnShards(){ for(var i=0;i<7;i++){ (function(i){ var s=document.createElement('s');
      s.style.cssText='left:50%;top:55%;background:'+HELPERS[cur].egg.shell+';';
      fx.appendChild(s); var ang=(-90+(i-3)*32)*Math.PI/180, dist=42+Math.random()*26;
      var tx=Math.cos(ang)*dist, ty=Math.sin(ang)*dist - 6;
      s.animate([{transform:'translate(-50%,-50%) rotate(0) scale(1)',opacity:1},
                 {transform:'translate(calc(-50% + '+tx+'px),calc(-50% + '+ty+'px)) rotate('+(tx*4)+'deg) scale(.5)',opacity:0}],
                {duration:620,easing:'cubic-bezier(.2,.7,.3,1)'});
      setTimeout(function(){ s.remove(); },640);
    })(i); } }
  function welcome(id){ say(HELPERS[id].hello,{dur:7600}); }

  /* ---------- chooser / settings modal ---------- */
  var modeFirst=false;
  function openModal(first){ modeFirst=first; modal.classList.toggle('settings',!first);
    titleEl.textContent=first?'Choose your guide ✦':'Guides';

  function closeModal(){ modal.classList.remove('show'); }
  function refreshCards(){ cardsEl.querySelectorAll('.ykCard').forEach(function(c){

  function refreshFoot(){ var on=modal.querySelector('#ykOn'), off=modal.querySelector('#ykOff');
      on.classList.toggle('act',enabled); off.classList.toggle('act',!enabled); }
  function pickCard(id){
    if(modeFirst){ closeModal(); hatch(id); return; }

    if(didHatch(id)){ closeModal(); quickSwap(id); }
    else { closeModal(); hatch(id); }

  function quickSwap(id){ img.style.transition='opacity .2s,transform .2s'; img.style.opacity='0'; img.style.transform='scale(.85)';

    },200); }

  modal.querySelector('#ykOn').addEventListener('click',function(){ setEnabled(true); refreshFoot(); });
  modal.querySelector('#ykOff').addEventListener('click',function(){ setEnabled(false); refreshFoot(); });
  modal.addEventListener('click',function(e){ if(e.target===modal && !modeFirst) closeModal(); });
  gear.addEventListener('click',function(e){ e.stopPropagation(); openModal(false); });

  /* ---------- summon (tap guide) ---------- */
  var lore=[
    'Keep <b>FIRE</b> & <b>POLICE</b> coverage up — safe wards grow richer, and richer wards stay beautiful.',

  if(cur) applyHelper(cur);
  applyVis();
  if(enabled && !cur) setTimeout(function(){ openModal(true); },700);

  var builds=document.getElementById('builds');
  if(builds) builds.addEventListener('click',function(e){ var b=e.target.closest('.bbtn'); if(!b||b.classList.contains('lock'))return;

  if(typeof window.place==='function'){ var _place=window.place;

      return r; }; }

  function tipBtn(id,key,text,pt){ var el=document.getElementById(id); if(!el)return;
    el.addEventListener('click',function(){ once(key,text,pt?{point:pt}:undefined); },true); }
  tipBtn('valBtn','value','This is <span class="ko">land value</span> — the soul of a ward. Green thrives, red suffers. Poverty breeds litter, beggars… and worse.','#valBtn');
  tipBtn('dexBtn','dex','The DEX swaps the SOL you earn into $SORU. Burning $SORU fuels Kami ⛩ and turns the Ages forward.','#dexBtn');
  tipBtn('advanceBtn','advance','Ages turn on <i>collective</i> Kami ⛩ — every $SORU burned across the whole island, never one player alone. Push toward the next age!','#advanceBtn');
  tipBtn('arsonBtn','raid','Ah… the cruel part. 🔥 Torch and sack rival wards. Soru Shiti was never gentle — beauty and ash, always together.','#arsonBtn');
  tipBtn('pillageBtn','raid','Ah… the cruel part. 🏴 Sack a rival\'s holding for their $SORU. Beauty and brutality are two halves of one island.','#pillageBtn');
  tipBtn('guardBtn','guard','Hire a ronin retainer to shield one building from the next raid. Even beauty needs a blade at the gate. 🛡','#guardBtn');
  tipBtn('handBtn','move','✋ MOVE lets you pick a building up and set it down elsewhere — rework your ward without razing it.');
  tipBtn('demoBtn','raze','⛏ RAZE clears your own works to make room. Rivals\' plots you must take by force (PILLAGE / ARSON).');
})();

<script id="sorugotchi">
/* ============================================================
   SORU SHITI — Soru-gotchi (ソルゴッチ)
   A self-contained Tamagotchi-style mini-pet overlay.
   • Unlocks once the player has ≥1 structure (c.dev or c.civ).
   • Egg → Baby → Adult → Final, gated by a hidden 0-100 "care" stat.
   • In-engine time only (advances on the render loop's dt, no
     offline/wall-clock simulation, no localStorage time-travel).
   • Never touches sim/economy — read-only on S/grid/W/H.
   ============================================================ */
(function(){
  "use strict";
  if (window.__sorugotchi) return; window.__sorugotchi = true;

  /* ---------- data (injected separately: SG_ADULT, SG_FINAL, SG_BABY, SG_TIERS) ---------- */
  // SG_ADULT  = { "F_borg":{idle:[b64,b64],happy:[..],sad:[..],sick:[..]}, "M_borg":{...}, "F_rogue":{...}, "M_rogue":{...} }
  // SG_FINAL  = { "butler":{idle:[..],happy:[..],sad:[..],sick:[..],sleep:[b64]}, ... } // chatelaine/kreg only have idle+sleep
  // SG_TIERS  = { "butler":["good","M"], "seraphim":["good","MF"], ... }
  // SG_BABY   = { good:[b64,...], flex:[b64,...], bad:[b64,...] }

  var TIER_NAMES = { good:[], avg:[], bad:[] };
  Object.keys(SG_TIERS).forEach(function(name){ TIER_NAMES[SG_TIERS[name][0]].push(name); });

  /* ---------- persistence (webview-safe, same convention as ykMascot) ---------- */
  function lget(k,d){ try{ var v=localStorage.getItem(k); return v==null?d:v; }catch(e){ return d; } }
  function lset(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
  function jget(k,d){ try{ return JSON.parse(lget(k,JSON.stringify(d))); }catch(e){ return d; } }

  var DEFAULT_PET = null; // null = no egg yet
  var pet = jget('sg_pet', DEFAULT_PET);
  var seenUnlock = lget('sg_seen_unlock','0')==='1';
  var open = lget('sg_open','0')==='1'; // device shell open/minimized

  function save(){ lset('sg_pet', JSON.stringify(pet)); }

  /* ---------- structure-count check (read-only on game state) ---------- */
  function hasAnyStructure(){
    if (typeof grid==='undefined' || typeof W==='undefined' || typeof H==='undefined') return false;
    for (var y=0;y<H;y++) for (var x=0;x<W;x++){
      var c=grid[y][x];
      if (c && (c.dev || c.civ)) return true;
    }
    return false;
  }

  /* ---------- pet lifecycle ---------- */
  var STAGE = { EGG:'egg', BABY:'baby', ADULT:'adult', FINAL:'final' };

  // Age thresholds, in accumulated "care ticks" (real seconds of game-open time, in-engine only)
  var BABY_AGE_SEC   = 60*6;   // 6 min as baby before adult evolution check
  var ADULT_AGE_SEC  = 60*10;  // 10 min as adult before final evolution check

  function newEgg(){
    return {
      stage: STAGE.EGG,
      babyGroup: null,     // 'good'|'flex'|'bad' chosen at hatch
      babySprite: null,    // chosen baby sprite (b64) at hatch
      gender: null,        // 'M'|'F', locked at Adult
      adultForm: null,     // 'F_borg' etc
      finalName: null,     // 'butler' etc
      mood: 'idle',        // idle|happy|sad|sick
      care: 60,            // hidden 0-100 running care average
      careSamples: 1,
      ageSec: 0,           // seconds spent in current stage
      hunger: 70, fun: 70, clean: 70, // 0-100 each; feed/play/clean nudge these; decay over time
      poop: 0,             // 0-3, classic tamagotchi poop count
      lastTick: Date.now()
    };
  }

  function clamp01_100(v){ return Math.max(0, Math.min(100, v)); }

  function nudgeCare(delta){
    if (!pet) return;
    pet.care = clamp01_100(pet.care + delta);
    pet.careSamples++;
  }

  function recomputeMood(){
    if (!pet) return;
    if (pet.poop>=3 || pet.clean<20) { pet.mood='sick'; return; }
    if (pet.hunger<25 || pet.fun<25)  { pet.mood='sad';  return; }
    if (pet.hunger>70 && pet.fun>70 && pet.clean>70){ pet.mood='happy'; return; }
    pet.mood='idle';
  }

  /* ---------- evolution rolls ---------- */
  function pickBabyGroup(){
    // Good care biases toward 'good' babies, neglect biases 'bad'; flexible always has the widest spread.
    var c = pet.care;
    var r = Math.random()*100;
    if (c>=65){ if (r<55) return 'good'; if (r<90) return 'flex'; return 'bad'; }
    if (c>=35){ if (r<20) return 'good'; if (r<80) return 'flex'; return 'bad'; }
    if (r<10) return 'good'; if (r<45) return 'flex'; return 'bad';
  }

  function pickAdultTheme(babyGroup){
    // good babies lean borg(good tier), bad babies lean rogue(bad tier), flex babies driven by current care.
    var leanGood;
    if (babyGroup==='good') leanGood = pet.care>=30; // strong lean, only total neglect flips it
    else if (babyGroup==='bad') leanGood = pet.care>=80; // strong lean the other way, only excellent care flips it
    else leanGood = pet.care>=50;
    return leanGood ? 'borg' : 'rogue';
  }

  function pickFinalTier(){
    var c = pet.care;
    var r = Math.random()*100;
    if (c>=70){ if (r<60) return 'good'; if (r<92) return 'avg'; return 'bad'; }
    if (c>=40){ if (r<20) return 'good'; if (r<80) return 'avg'; return 'bad'; }
    if (r<5) return 'good'; if (r<35) return 'avg'; return 'bad';
  }

  function pickFinalName(tier, gender){
    var pool = TIER_NAMES[tier].filter(function(n){
      var g = SG_TIERS[n][1];
      return g==='MF' || g===gender;
    });
    if (!pool.length) pool = TIER_NAMES[tier]; // safety fallback
    return pool[Math.floor(Math.random()*pool.length)];
  }

  function hatchEgg(){
    pet = newEgg();
    pet.babyGroup = pickBabyGroup();
    var arr = SG_BABY[pet.babyGroup];
    pet.babySprite = arr[Math.floor(Math.random()*arr.length)];
    pet.stage = STAGE.BABY;
    pet.ageSec = 0;
    save();
    showToast(BABY_MSG[pet.babyGroup]);
  }

  function evolveToAdult(){
    pet.gender = Math.random()<0.5 ? 'M' : 'F';
    var theme = pickAdultTheme(pet.babyGroup);
    pet.adultForm = pet.gender + '_' + theme;
    pet.stage = STAGE.ADULT;
    pet.ageSec = 0;
    save();
    showToast('進化した！ ' + pet.adultForm + ' に変わった。');
  }

  function evolveToFinal(){
    var tier = pickFinalTier();
    pet.finalName = pickFinalName(tier, pet.gender);
    pet.stage = STAGE.FINAL;
    pet.ageSec = 0;
    save();
    showToast('最終進化！ ' + pet.finalName + '。');
  }

  var BABY_MSG = {
    good: '卵から生まれた！ いい子みたい。',
    flex: '卵から生まれた！ どうなるかな…',
    bad:  '卵から生まれた！ ちょっと心配…'
  };

  /* ---------- per-frame update (in-engine time only) ---------- */
  var lastUpdate = null;
  function update(dt){
    if (!pet) return;
    pet.ageSec += dt;
    // gentle decay over time — classic tamagotchi neglect pressure
    var decay = dt * 0.12; // ~ full bar over ~14 minutes if never tended
    pet.hunger = clamp01_100(pet.hunger - decay);
    pet.fun    = clamp01_100(pet.fun - decay*0.8);
    pet.clean  = clamp01_100(pet.clean - decay*0.5);
    // running care average folds in current bars passively, so idle time still nudges care toward bar state
    var instant = (pet.hunger+pet.fun+pet.clean)/3;
    pet.care = clamp01_100(pet.care + (instant-pet.care)*Math.min(1, dt*0.01));
    // poop chance
    poopAcc += dt;
    if (poopAcc > 45 && Math.random() < dt*0.01){ pet.poop = Math.min(3, pet.poop+1); poopAcc=0; }
    recomputeMood();

    if (pet.stage===STAGE.BABY && pet.ageSec >= BABY_AGE_SEC) evolveToAdult();
    else if (pet.stage===STAGE.ADULT && pet.ageSec >= ADULT_AGE_SEC) evolveToFinal();
  }
  var poopAcc = 0;

  /* ---------- actions ---------- */
  function feed(){ if (!pet) return; pet.hunger = clamp01_100(pet.hunger+22); nudgeCare(3); recomputeMood(); save(); render(); bounce(); }
  function play(){ if (!pet) return; pet.fun = clamp01_100(pet.fun+22); nudgeCare(3); recomputeMood(); save(); render(); bounce(); }
  function cleanPoop(){ if (!pet) return; if (pet.poop>0){ pet.poop=0; pet.clean=clamp01_100(pet.clean+30); nudgeCare(4); recomputeMood(); save(); render(); bounce(); } }

  /* ---------- DOM / shell ---------- */
  var css=document.createElement('style'); css.id='sgCSS';
  css.textContent =
   '#sgTab{position:fixed;z-index:13;font:700 11px/1 "Trebuchet MS",sans-serif;'
  +'background:linear-gradient(#262b31,#15181c);color:#9aa3ad;border:1px solid #3a4048;border-radius:8px;'
  +'padding:6px 10px;cursor:grab;box-shadow:0 4px 10px rgba(0,0,0,.4);display:none;align-items:center;gap:6px;touch-action:none;user-select:none}'
  +'#sgTab.show{display:flex}#sgTab .dot{width:7px;height:7px;border-radius:50%;background:#14f195;box-shadow:0 0 6px #14f195}'
  +'#sgTab.unseen{animation:sgPulse 1.4s ease infinite}'
  +'#sgTab.dragging{cursor:grabbing;opacity:.85}'
  +'@keyframes sgPulse{0%,100%{box-shadow:0 4px 10px rgba(0,0,0,.4)}50%{box-shadow:0 4px 18px rgba(20,241,149,.5)}}'
  +'#sgDevice{position:fixed;z-index:14;width:178px;display:none;font-family:"Trebuchet MS",sans-serif;touch-action:none}'
  +'#sgDevice.show{display:block}'
  +'#sgDevice.dragging #sgShell{opacity:.85}'
  +'#sgHead{cursor:grab;touch-action:none;user-select:none}'
  +'#sgHead.dragging{cursor:grabbing}'
  +'#sgShell{background:linear-gradient(160deg,#e3dccb,#cdc4ab);border:3px solid #8a7f63;border-radius:18px 18px 22px 22px;'
  +'padding:10px 10px 12px;box-shadow:0 10px 28px rgba(0,0,0,.5)}'
  +'#sgHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}'
  +'#sgTitle{font-size:9px;font-weight:700;color:#5a5240;letter-spacing:.5px}'
  +'#sgMin{cursor:pointer;color:#5a5240;font-weight:700;font-size:13px;padding:0 4px}'
  +'#sgScreen{background:#9bbd6a;border:3px solid #3a4a2a;border-radius:6px;aspect-ratio:1/0.82;position:relative;overflow:hidden;'
  +'image-rendering:pixelated;box-shadow:inset 0 0 12px rgba(0,0,0,.35)}'
  +'#sgScreen:after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,.06) 0,rgba(0,0,0,.06) 1px,transparent 1px,transparent 2px);pointer-events:none}'
  +'#sgStatus{position:absolute;top:3px;left:4px;right:4px;display:flex;justify-content:space-between;font-size:7px;color:#1d2a10;font-weight:700;z-index:2}'
  +'#sgPetWrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}'
  +'#sgPetImg{width:54%;image-rendering:pixelated;filter:drop-shadow(0 2px 0 rgba(29,42,16,.25))}'
  +'#sgPetImg.bounce{animation:sgBounce .5s ease}'
  +'@keyframes sgBounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}'
  +'#sgPoop{position:absolute;bottom:6%;display:flex;gap:3px;left:50%;transform:translateX(-50%);z-index:2}'
  +'#sgPoop span{font-size:11px;filter:drop-shadow(0 1px 0 rgba(29,42,16,.4))}'
  +'#sgEggWrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}'
  +'#sgEgg{width:30%;aspect-ratio:1/1.2;background:radial-gradient(60% 55% at 38% 30%,#eef7df,#cfe2a8 60%,#9bbd6a 100%);'
  +'border:2px solid #3a4a2a;border-radius:50% 50% 46% 46%/60% 60% 40% 40%;cursor:pointer}'
  +'#sgEgg.wob{animation:sgWob .6s ease}'
  +'@keyframes sgWob{0%,100%{transform:rotate(0)}25%{transform:rotate(-7deg)}55%{transform:rotate(6deg)}80%{transform:rotate(-3deg)}}'
  +'#sgEggHint{font-size:8px;color:#1d2a10;font-weight:700;text-align:center;padding:0 8px}'
  +'#sgBtns{display:flex;justify-content:space-between;margin-top:9px;padding:0 4px}'
  +'.sgBtn{width:30px;height:30px;border-radius:50%;border:2px solid #6a604a;background:linear-gradient(#cfc6ad,#a99e80);'
  +'color:#3a3424;font-weight:700;font-size:11px;cursor:pointer;box-shadow:0 2px 4px rgba(0,0,0,.3)}'
  +'.sgBtn:active{transform:translateY(1px);box-shadow:0 1px 2px rgba(0,0,0,.3)}'
  +'#sgLabels{display:flex;justify-content:space-between;margin-top:2px;padding:0 4px}'
  +'#sgLabels span{font-size:7px;color:#5a5240;width:30px;text-align:center;font-weight:700}'
  +'#sgToast{position:absolute;left:4px;right:4px;bottom:4px;background:rgba(29,42,16,.88);color:#cfe2a8;font-size:7.5px;'
  +'line-height:1.3;padding:4px 5px;border-radius:4px;opacity:0;transition:opacity .25s;z-index:3;pointer-events:none}'
  +'#sgToast.show{opacity:1}'
  +'#sgStatusPanel{position:absolute;inset:0;background:rgba(155,189,106,.97);display:none;flex-direction:column;'
  +'justify-content:center;padding:8px;font-size:7.5px;color:#1d2a10;font-weight:700;line-height:1.55;z-index:4}'
  +'#sgStatusPanel.show{display:flex}'
  +'.sgBar{height:5px;background:rgba(29,42,16,.18);border-radius:3px;margin:1px 0 4px;overflow:hidden}'
  +'.sgBar i{display:block;height:100%;background:#1d2a10}'
  +'@media(max-width:760px){#sgDevice{width:150px}#sgTab{font-size:10px;padding:5px 8px}}';
  document.head.appendChild(css);

  var tab=document.createElement('div'); tab.id='sgTab';
  tab.innerHTML='<span class="dot"></span><span>ソルゴッチ</span>';
  document.body.appendChild(tab);

  var device=document.createElement('div'); device.id='sgDevice';
  device.innerHTML =
    '<div id="sgShell">'
    + '<div id="sgHead"><span id="sgTitle">ソルゴッチ</span><span id="sgMin">—</span></div>'
    + '<div id="sgScreen">'
    +   '<div id="sgStatus"><span id="sgStageLbl">EGG</span><span id="sgPoopCount"></span></div>'
    +   '<div id="sgEggWrap"><div id="sgEgg"></div><div id="sgEggHint">タップして孵化</div></div>'
    +   '<div id="sgPetWrap"><img id="sgPetImg" alt="pet"></div>'
    +   '<div id="sgPoop"></div>'
    +   '<div id="sgStatusPanel"></div>'
    +   '<div id="sgToast"></div>'
    + '</div>'
    + '<div id="sgBtns"><button class="sgBtn" id="sgA">A</button><button class="sgBtn" id="sgB">B</button><button class="sgBtn" id="sgC">C</button></div>'
    + '<div id="sgLabels"><span>えさ</span><span>遊ぶ</span><span>掃除/状態</span></div>'
    + '</div>';
  document.body.appendChild(device);

  /* ---------- positioning: default above the build palette, persisted + draggable ---------- */
  var savedPos = jget('sg_pos', null); // {x,y} top-left, in px, or null for default

  function panelTop(){
    var panel = document.getElementById('panel');
    if (panel) { var r = panel.getBoundingClientRect(); if (r.height>0) return r.top; }
    return window.innerHeight - 160; // safety fallback if #panel isn't found
  }
  function defaultDevicePos(){
    var w = device.offsetWidth || 178;
    var top = Math.max(8, panelTop() - (device.offsetHeight || 230) - 10);
    return { x: 10, y: top };
  }
  function defaultTabPos(){
    var top = Math.max(8, panelTop() - (tab.offsetHeight || 32) - 10);
    return { x: 10, y: top };
  }
  function applyPos(el, pos){
    el.style.left = pos.x+'px'; el.style.top = pos.y+'px';
    el.style.right=''; el.style.bottom='';
  }
  function clampPos(pos, el){
    var w = el.offsetWidth||100, h = el.offsetHeight||40;
    return {
      x: Math.min(Math.max(0,pos.x), window.innerWidth - w),
      y: Math.min(Math.max(0,pos.y), window.innerHeight - h)
    };
  }
  function refreshPosition(){
    // device and tab move together — same saved spot, whichever is visible sits there.
    var pos = savedPos || (device.classList.contains('show') ? defaultDevicePos() : defaultTabPos());
    pos = clampPos(pos, device.classList.contains('show') ? device : tab);
    applyPos(tab, pos); applyPos(device, pos);
  }
  window.addEventListener('resize', refreshPosition);

  /* ---------- generic drag (pointer events, works for mouse + touch) ---------- */
  var suppressClickUntil = 0;
  function makeDraggable(handleEl, moveEl){
    var sx=0, sy=0, ox=0, oy=0, dragging=false, moved=false;
    handleEl.addEventListener('pointerdown', function(e){
      dragging=true; moved=false;
      try{ handleEl.setPointerCapture(e.pointerId); }catch(_){}
      var r = moveEl.getBoundingClientRect();
      sx=e.clientX; sy=e.clientY; ox=r.left; oy=r.top;
      handleEl.classList.add('dragging');
    });
    handleEl.addEventListener('pointermove', function(e){
      if (!dragging) return;
      var dx=e.clientX-sx, dy=e.clientY-sy;
      if (Math.abs(dx)>3||Math.abs(dy)>3) moved=true;
      if (!moved) return;
      var pos = clampPos({x:ox+dx, y:oy+dy}, moveEl);
      savedPos = pos; applyPos(tab,pos); applyPos(device,pos);
    });
    function end(e){
      if (!dragging) return;
      dragging=false; handleEl.classList.remove('dragging');
      if (moved && savedPos){ lset('sg_pos', JSON.stringify(savedPos)); suppressClickUntil = performance.now()+50; }
      moved=false;
    }
    handleEl.addEventListener('pointerup', end);
    handleEl.addEventListener('pointercancel', end);
  }
  makeDraggable(tab, tab);
  makeDraggable(device.querySelector('#sgHead'), device);
  refreshPosition();

  var elScreen=device.querySelector('#sgScreen'), elEggWrap=device.querySelector('#sgEggWrap'), elEgg=device.querySelector('#sgEgg'),
      elPetWrap=device.querySelector('#sgPetWrap'), elPetImg=device.querySelector('#sgPetImg'), elPoop=device.querySelector('#sgPoop'),
      elStage=device.querySelector('#sgStageLbl'), elToast=device.querySelector('#sgToast'),
      elStatusPanel=device.querySelector('#sgStatusPanel'), elMin=device.querySelector('#sgMin');

  var toastT=null;
  function showToast(text){ elToast.textContent=text; elToast.classList.add('show');
    clearTimeout(toastT); toastT=setTimeout(function(){ elToast.classList.remove('show'); }, 3400); }

  function bounce(){ elPetImg.classList.remove('bounce'); void elPetImg.offsetWidth; elPetImg.classList.add('bounce'); }

  /* ---------- frame selection ---------- */
  var animPhase=0;
  function spriteFor(){
    if (!pet) return null;
    if (pet.stage===STAGE.BABY) return pet.babySprite;
    if (pet.stage===STAGE.ADULT){
      var set = SG_ADULT[pet.adultForm];
      var mood = set[pet.mood] ? pet.mood : 'idle';
      var frames = set[mood];
      return frames[animPhase % frames.length];
    }
    if (pet.stage===STAGE.FINAL){
      var fset = SG_FINAL[pet.finalName];
      if (!fset) return null;
      var fmood = fset[pet.mood] ? pet.mood : (fset.idle ? 'idle' : Object.keys(fset)[0]);
      var fframes = fset[fmood];
      return fframes[animPhase % fframes.length];
    }
    return null;
  }

  var lastUnlocked = false, lastOpen = false;
  function render(){
    var unlocked = hasAnyStructure();
    tab.classList.toggle('show', unlocked);
    if (unlocked !== lastUnlocked){ lastUnlocked=unlocked; if (unlocked) refreshPosition(); }
    if (!unlocked){ device.classList.remove('show'); return; }
    if (!seenUnlock){ seenUnlock=true; lset('sg_seen_unlock','1'); tab.classList.add('unseen');
      showToastOnTab(); }

    device.classList.toggle('show', open);
    if (open !== lastOpen){ lastOpen=open; refreshPosition(); }
    if (!open) return;

    if (!pet){
      elEggWrap.style.display='flex'; elPetWrap.style.display='none'; elPoop.innerHTML=''; elStage.textContent='卵';
      return;
    }
    elEggWrap.style.display='none'; elPetWrap.style.display='flex';
    elStage.textContent = ({egg:'卵',baby:'ベビー',adult:'アダルト',final:'最終'})[pet.stage];
    var src = spriteFor();
    if (src) elPetImg.src = 'data:image/png;base64,'+src;
    elPoop.innerHTML=''; for (var i=0;i<pet.poop;i++){ var s=document.createElement('span'); s.textContent='💩'; elPoop.appendChild(s); }
  }

  function showToastOnTab(){ /* first-unlock notification, shown once via tab pulse + a one-time toast on open */ }

  function renderStatus(){
    if (!pet) return;
    elStatusPanel.innerHTML =
      bar('満腹', pet.hunger) + bar('元気', pet.fun) + bar('清潔', pet.clean);
    elStatusPanel.classList.add('show');
    setTimeout(function(){ elStatusPanel.classList.remove('show'); }, 2600);
  }
  function bar(label, val){
    return '<div>'+label+'</div><div class="sgBar"><i style="width:'+Math.round(val)+'%"></i></div>';
  }

  /* ---------- input ---------- */
  tab.addEventListener('click', function(){
    if (performance.now() < suppressClickUntil) return; // was a drag, not a tap
    open = !open; lset('sg_open', open?'1':'0');
    tab.classList.remove('unseen');
    render();
  });
  elMin.addEventListener('click', function(e){ e.stopPropagation(); open=false; lset('sg_open','0'); render(); });
  elEgg.addEventListener('click', function(){
    elEgg.classList.add('wob');
    setTimeout(function(){ hatchEgg(); render(); }, 650);
  });
  device.querySelector('#sgA').addEventListener('click', feed);
  device.querySelector('#sgB').addEventListener('click', play);
  device.querySelector('#sgC').addEventListener('click', function(){
    if (pet && pet.poop>0) cleanPoop(); else renderStatus();
  });

  /* ---------- tick ---------- */
  var lastT=null;
  function frame(t){
    var dt = lastT ? Math.min(0.25, (t-lastT)/1000) : 0; lastT=t;
    update(dt);
    animPhase = Math.floor(t/650)%2;
    if (open) render();
    else { // keep tab visibility in sync even when device is closed
      var unlocked = hasAnyStructure();
      tab.classList.toggle('show', unlocked);
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
  render();
})();
</script>
</body>
</html>
